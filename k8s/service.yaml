apiVersion: v1
kind: Service
metadata:
  name: kubescale-service
  namespace: default
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"          # optional: use NLB
    service.beta.kubernetes.io/aws-load-balancer-internal: "false"     # make it Internet-facing
spec:
  type: LoadBalancer
  selector:
    app: kubescale
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  externalTrafficPolicy: Cluster

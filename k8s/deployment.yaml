apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubescale-deployment
  namespace: default
  labels:
    app: kubescale
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubescale
  template:
    metadata:
      labels:
        app: kubescale
    spec:
      containers:
        - name: kubescale-container
          image: 593814964617.dkr.ecr.ap-south-1.amazonaws.com/kubescale:latest
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "250m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kubescale-service
  namespace: default
spec:
  selector:
    app: kubescale
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80

name: KubeScale CI/CD Blue/Green

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          IMAGE_URI=593814964617.dkr.ecr.ap-south-1.amazonaws.com/kubescale:latest
          docker build -t $IMAGE_URI ./k8s/html
          docker push $IMAGE_URI

      - name: Deploy green version
        run: |
          GREEN_DEPLOYMENT=nginx-green
          IMAGE_URI=593814964617.dkr.ecr.ap-south-1.amazonaws.com/kubescale:latest
          # Update deployment.yaml for green version
          sed -i "s|image: .*|image: $IMAGE_URI|" ./k8s/deployment.yaml
          kubectl apply -f ./k8s/deployment.yaml

      - name: Wait for green pods to be ready
        run: |
          GREEN_DEPLOYMENT=nginx-green
          kubectl rollout status deployment/$GREEN_DEPLOYMENT --timeout=120s

      - name: Switch Service to green
        run: |
          # Update Service selector to point to green version
          kubectl patch svc nginx -p '{"spec":{"selector":{"app":"nginx","version":"green"}}}'

      - name: Optional: Cleanup old blue pods
        run: |
          kubectl delete deployment nginx-blue || true
